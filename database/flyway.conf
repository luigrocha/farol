# Flyway configuration for Farol – Supabase (PostgreSQL)
# Sensitive credentials (FLYWAY_URL, FLYWAY_USER, FLYWAY_PASSWORD)
# must be set via environment variables or .env file.
# Run: make db-migrate  (or: scripts/db_migrate.sh)

flyway.locations=filesystem:database/migrations
flyway.schemas=public
flyway.validateOnMigrate=true
flyway.outOfOrder=false
flyway.baselineOnMigrate=false
flyway.encoding=UTF-8
flyway.connectRetries=3
