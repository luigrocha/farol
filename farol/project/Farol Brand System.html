<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Farol — Brand System</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9;
    font-family: Inter, system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  * { box-sizing: border-box; }
  @keyframes farolFade {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .tnum { font-variant-numeric: tabular-nums; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="logos.jsx"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="prototype.jsx"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="env,react">
// ─────────────────────────────────────────────────────────────
// Tweakable defaults — wrapped in EDITMODE markers so the host
// can persist knob changes to disk.
// ─────────────────────────────────────────────────────────────
const TWEAKS = /*EDITMODE-BEGIN*/{
  "logoConcept": "A",
  "accentHue": "beam",
  "darkMode": false
}/*EDITMODE-END*/;

const HUE = {
  beam:    { beam: '#F5A623', name: 'FAROL BEAM',    hex: '#F5A623' },
  tide:    { beam: '#1A7A4A', name: 'FAROL TIDE',    hex: '#1A7A4A' },
  coral:   { beam: '#E84855', name: 'FAROL CORAL',   hex: '#E84855' },
};

// ─────────────────────────────────────────────────────────────
// CANVAS SECTIONS
// ─────────────────────────────────────────────────────────────

// Header / title slab
function CanvasHeader({ logoConcept }) {
  return (
    <div style={{ padding: '0 60px 60px', maxWidth: 1400 }}>
      <div style={{ display: 'flex', alignItems: 'flex-end', gap: 32, flexWrap: 'wrap' }}>
        <Lockup concept={logoConcept} size={68}/>
        <div style={{ paddingBottom: 8 }}>
          <div style={{ fontSize: 13, fontWeight: 500, color: 'rgba(60,50,40,0.55)', letterSpacing: 0.4, textTransform: 'uppercase' }}>
            Brand identity system · v1
          </div>
          <div style={{ fontSize: 20, fontWeight: 500, color: 'rgba(40,30,20,0.7)', marginTop: 4, maxWidth: 520 }}>
            Clareza para cada real. Seu dinheiro no rumo certo.
          </div>
        </div>
      </div>
      <div style={{ display: 'flex', gap: 14, marginTop: 36, flexWrap: 'wrap' }}>
        {['Trustworthy','Smart','Brazilian','Calm','Guiding'].map(w => (
          <div key={w} style={{
            padding: '8px 14px', borderRadius: 99,
            background: '#fff', border: '1px solid rgba(0,0,0,0.08)',
            fontSize: 12, fontWeight: 500, color: '#374151', letterSpacing: 0.2,
          }}>{w}</div>
        ))}
      </div>
    </div>
  );
}

// Logo concepts grid
function LogosSection({ accent }) {
  const concepts = [
    { id: 'A', title: 'The Beam',     sub: 'Tower + 45° growth ray' },
    { id: 'B', title: 'The Lens',     sub: 'Fresnel cross-section' },
    { id: 'C', title: 'The Path',     sub: 'Beacon pin + ray' },
    { id: 'D', title: 'Wordmark',     sub: 'A as lighthouse tower' },
  ];
  return (
    <DCSection title="01 · Logo concepts"
      subtitle="Four routes, each reducing the lighthouse to a single essential gesture.">
      {concepts.map(c => (
        <DCArtboard key={c.id} label={`Concept ${c.id} — ${c.title}`} width={320} height={420}>
          <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
            {/* primary lockup */}
            <div style={{
              flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center',
              padding: 32, borderBottom: '1px solid #eee',
            }}>
              <Lockup concept={c.id} size={44} accent={accent}/>
            </div>
            {/* mono + reversed */}
            <div style={{ display: 'flex', borderBottom: '1px solid #eee' }}>
              <div style={{ flex: 1, padding: 24, borderRight: '1px solid #eee',
                display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                <Lockup concept={c.id} size={26} color="#1B3A5C" accent="#1B3A5C"/>
              </div>
              <div style={{ flex: 1, padding: 24, background: '#1B3A5C',
                display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                <Lockup concept={c.id} size={26} color="#fff" accent={accent}/>
              </div>
            </div>
            {/* app icon + favicon */}
            <div style={{ padding: 20, display: 'flex', alignItems: 'center', gap: 20 }}>
              <AppIcon concept={c.id} accent={accent} size={72}/>
              <AppIcon concept={c.id} accent={accent} size={40} radius={8}/>
              <AppIcon concept={c.id} accent={accent} size={24} radius={5}/>
              <div style={{ flex: 1, textAlign: 'right' }}>
                <div style={{ fontSize: 11, color: '#6B7280', fontWeight: 500 }}>{c.sub}</div>
                <div style={{ fontSize: 10, color: '#9CA3AF', marginTop: 2 }}>1024 · 180 · 32</div>
              </div>
            </div>
          </div>
        </DCArtboard>
      ))}
    </DCSection>
  );
}

function AppIcon({ concept, accent, size = 80, radius }) {
  const r = radius != null ? radius : size * 0.22;
  return (
    <div style={{
      width: size, height: size, borderRadius: r,
      background: '#1B3A5C',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      boxShadow: '0 2px 6px rgba(0,0,0,0.1)',
    }}>
      {concept === 'A' && <LogoA size={size * 0.62} tower="#fff" beam={accent}/>}
      {concept === 'B' && <LogoB size={size * 0.62} ring="#fff" core={accent}/>}
      {concept === 'C' && <LogoC size={size * 0.62} body="#fff" ray={accent}/>}
      {concept === 'D' && <LogoA size={size * 0.62} tower="#fff" beam={accent}/>}
    </div>
  );
}

// Color system
function ColorsSection() {
  const primary = [
    { name: 'FAROL NAVY',  hex: '#1B3A5C', rgb: '27, 58, 92',   cmyk: '82 67 31 19', note: 'Deep ocean trust, authority', onLight: '#fff' },
    { name: 'FAROL BEAM',  hex: '#F5A623', rgb: '245, 166, 35', cmyk: '0 40 95 0',    note: 'Warm amber beam, optimism', onLight: '#1B3A5C' },
  ];
  const secondary = [
    { name: 'FAROL TIDE',  hex: '#1A7A4A', role: 'Success · Positive',   onLight: '#fff' },
    { name: 'FAROL CORAL', hex: '#E84855', role: 'Error · Over budget',  onLight: '#fff' },
    { name: 'FAROL FOG',   hex: '#F3F4F6', role: 'Surface · Breathing',  onLight: '#1B3A5C' },
    { name: 'FAROL SLATE', hex: '#374151', role: 'Body · Secondary',     onLight: '#fff' },
  ];
  return (
    <DCSection title="02 · Color system"
      subtitle="Navy for authority, beam for direction. Everything else supports meaning.">
      {/* Primary */}
      <DCArtboard label="Primary palette" width={540} height={360}>
        <div style={{ padding: 24, height: '100%' }}>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16, height: '100%' }}>
            {primary.map(c => (
              <div key={c.name} style={{
                background: c.hex, color: c.onLight, borderRadius: 12,
                padding: 20, display: 'flex', flexDirection: 'column', justifyContent: 'space-between',
              }}>
                <div style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 11, opacity: 0.7 }}>{c.hex}</div>
                <div>
                  <div style={{ fontSize: 15, fontWeight: 700, letterSpacing: 0.5, marginBottom: 4 }}>{c.name}</div>
                  <div style={{ fontSize: 11, opacity: 0.75, lineHeight: 1.4 }}>{c.note}</div>
                  <div style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 9, opacity: 0.55, marginTop: 8 }}>
                    RGB {c.rgb}<br/>CMYK {c.cmyk}
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
      </DCArtboard>

      {/* Secondary */}
      <DCArtboard label="Secondary · Semantic" width={540} height={360}>
        <div style={{ padding: 24, height: '100%', display: 'grid',
          gridTemplateColumns: '1fr 1fr', gap: 12 }}>
          {secondary.map(c => (
            <div key={c.name} style={{
              background: c.hex, color: c.onLight, borderRadius: 10,
              padding: 16, display: 'flex', flexDirection: 'column', justifyContent: 'space-between',
              border: c.hex === '#F3F4F6' ? '1px solid #e5e7eb' : 'none',
            }}>
              <div style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 10, opacity: 0.7 }}>{c.hex}</div>
              <div>
                <div style={{ fontSize: 12, fontWeight: 700, letterSpacing: 0.3 }}>{c.name}</div>
                <div style={{ fontSize: 10, opacity: 0.75, marginTop: 2 }}>{c.role}</div>
              </div>
            </div>
          ))}
        </div>
      </DCArtboard>

      {/* Gradient + contrast */}
      <DCArtboard label="Farol Dusk · Accessibility" width={380} height={360}>
        <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
          <div style={{
            height: 140,
            background: 'linear-gradient(135deg, #1B3A5C 0%, #0D2238 100%)',
            display: 'flex', alignItems: 'flex-end', padding: 16,
            color: '#fff',
          }}>
            <div>
              <div style={{ fontSize: 10, opacity: 0.6, fontFamily: 'JetBrains Mono, monospace' }}>FAROL DUSK</div>
              <div style={{ fontSize: 13, fontWeight: 600, letterSpacing: 0.3 }}>135° · #1B3A5C → #0D2238</div>
              <div style={{ fontSize: 10, opacity: 0.6, marginTop: 2 }}>Onboarding surfaces only. Never on text.</div>
            </div>
          </div>
          <div style={{ padding: 16, display: 'flex', flexDirection: 'column', gap: 8 }}>
            <ContrastRow fg="#fff" bg="#1B3A5C" ratio="11.8:1" tag="AAA"/>
            <ContrastRow fg="#1B3A5C" bg="#F3F4F6" ratio="11.1:1" tag="AAA"/>
            <ContrastRow fg="#374151" bg="#fff" ratio="10.3:1" tag="AAA"/>
            <ContrastRow fg="#F5A623" bg="#1B3A5C" ratio="5.1:1" tag="AA"/>
            <ContrastRow fg="#fff" bg="#1A7A4A" ratio="4.9:1" tag="AA"/>
            <ContrastRow fg="#fff" bg="#E84855" ratio="4.6:1" tag="AA"/>
          </div>
        </div>
      </DCArtboard>
    </DCSection>
  );
}

function ContrastRow({ fg, bg, ratio, tag }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
      <div style={{
        width: 48, height: 26, borderRadius: 5, background: bg,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        border: bg === '#fff' ? '1px solid #eee' : 'none',
      }}>
        <span style={{ color: fg, fontSize: 11, fontWeight: 700 }}>Aa</span>
      </div>
      <div style={{ flex: 1, fontFamily: 'JetBrains Mono, monospace', fontSize: 10, color: '#6B7280' }}>
        {fg} / {bg}
      </div>
      <div style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 10, color: '#374151' }}>{ratio}</div>
      <div style={{
        padding: '2px 6px', borderRadius: 4, fontSize: 9, fontWeight: 700,
        background: '#1A7A4A', color: '#fff', letterSpacing: 0.3,
      }}>{tag}</div>
    </div>
  );
}

// Typography
function TypeSection() {
  const scale = [
    { label: 'Display',   size: 32, weight: 700, track: -0.5, use: 'Screen titles' },
    { label: 'Heading 1', size: 24, weight: 600, track: -0.3, use: 'Section headers' },
    { label: 'Heading 2', size: 20, weight: 600, track: 0,    use: 'Card titles' },
    { label: 'Heading 3', size: 17, weight: 500, track: 0,    use: 'Subsection labels' },
    { label: 'Body',      size: 15, weight: 400, track: 0.1,  use: 'Main content' },
    { label: 'Caption',   size: 13, weight: 400, track: 0.2,  use: 'Helper text' },
    { label: 'Label',     size: 11, weight: 500, track: 0.5,  use: 'Tags · KPIs', upper: true },
  ];
  return (
    <DCSection title="03 · Typography"
      subtitle="Inter — exceptional screen legibility, variable font, Brazilian fintech standard.">
      <DCArtboard label="Scale — mobile base 16px" width={720} height={460}>
        <div style={{ padding: 28 }}>
          {scale.map(s => (
            <div key={s.label} style={{
              display: 'flex', alignItems: 'baseline', gap: 24,
              padding: '10px 0', borderBottom: '1px solid #f3f4f6',
            }}>
              <div style={{ width: 96, fontSize: 11, color: '#9CA3AF',
                fontFamily: 'JetBrains Mono, monospace' }}>
                {s.size}/{s.weight}
              </div>
              <div style={{
                flex: 1,
                fontSize: s.size, fontWeight: s.weight, letterSpacing: s.track,
                color: '#1B3A5C',
                textTransform: s.upper ? 'uppercase' : 'none',
              }}>
                {s.label} — Clareza para cada real
              </div>
              <div style={{ width: 140, fontSize: 11, color: '#6B7280', textAlign: 'right' }}>{s.use}</div>
            </div>
          ))}
        </div>
      </DCArtboard>

      <DCArtboard label="Currency · tnum alignment" width={340} height={460}>
        <div style={{ padding: 28, height: '100%', display: 'flex', flexDirection: 'column', gap: 14 }}>
          <div>
            <div style={{ fontSize: 10, color: '#9CA3AF', letterSpacing: 1, textTransform: 'uppercase', marginBottom: 6 }}>
              Rule
            </div>
            <div style={{ fontSize: 13, color: '#374151', lineHeight: 1.5 }}>
              "R$" in <b>Caption weight</b>, amount in <b>Heading 2 weight</b>. Never mix weights in one amount.
            </div>
          </div>
          <div style={{ background: '#F3F4F6', borderRadius: 10, padding: 16,
            fontVariantNumeric: 'tabular-nums', display: 'flex', flexDirection: 'column', gap: 12 }}>
            {[{l:'Salário CLT', v: 6800}, {l:'Aluguel', v: -2400}, {l:'Swile', v: -42.8}, {l:'Investido', v: 12400}].map(r => (
              <div key={r.l} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline' }}>
                <span style={{ fontSize: 13, color: '#6B7280' }}>{r.l}</span>
                <BRL value={r.v} size={18} color={r.v < 0 ? '#E84855' : '#1A7A4A'} sign/>
              </div>
            ))}
          </div>
          <div style={{ fontSize: 10, color: '#9CA3AF', marginTop: 'auto',
            fontFamily: 'JetBrains Mono, monospace', lineHeight: 1.5 }}>
            font-feature-settings: "tnum" 1;<br/>
            font-variant-numeric: tabular-nums;
          </div>
        </div>
      </DCArtboard>
    </DCSection>
  );
}

// Icons section
function IconsSection({ accent }) {
  const custom = [
    { label: 'Benefit card',  Icon: IconBenefit, n: '01 · Swile' },
    { label: 'FGTS',          Icon: IconFGTS,    n: '02 · Governo' },
    { label: 'CLT salário',   Icon: IconCLT,     n: '03 · Trabalho' },
    { label: 'Farol score',   Icon: IconScore,   n: '04 · Score' },
    { label: 'Parcela',       Icon: IconParcela, n: '05 · Crédito' },
  ];
  const states = [
    { label: 'Inactive', color: '#374151', fill: '#F3F4F6', stroke: 2 },
    { label: 'Active',   color: accent,    fill: '#1B3A5C', stroke: 2 },
  ];
  return (
    <DCSection title="04 · Iconography"
      subtitle="Lucide-style · 2px stroke · round caps. Custom marks for Farol-specific concepts.">
      <DCArtboard label="Custom Farol icon set" width={620} height={280}>
        <div style={{ padding: 24, display: 'flex', gap: 16, justifyContent: 'space-between' }}>
          {custom.map(c => (
            <div key={c.label} style={{
              flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 12,
              padding: 12, borderRadius: 10, background: '#F9FAFB',
            }}>
              <div style={{ fontSize: 9, color: '#9CA3AF',
                fontFamily: 'JetBrains Mono, monospace' }}>{c.n}</div>
              <c.Icon size={32} color="#1B3A5C"/>
              <div style={{ fontSize: 11, color: '#374151', fontWeight: 500, textAlign: 'center' }}>{c.label}</div>
            </div>
          ))}
        </div>
      </DCArtboard>

      <DCArtboard label="States · sizes" width={420} height={280}>
        <div style={{ padding: 24, height: '100%',
          display: 'flex', flexDirection: 'column', gap: 20 }}>
          <div>
            <div style={{ fontSize: 10, color: '#9CA3AF', textTransform: 'uppercase', letterSpacing: 1, marginBottom: 12 }}>States</div>
            <div style={{ display: 'flex', gap: 20 }}>
              {states.map(s => (
                <div key={s.label} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6 }}>
                  <div style={{ width: 44, height: 44, borderRadius: 12,
                    background: s.fill, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                    <IconHome size={22} color={s.color}/>
                  </div>
                  <div style={{ fontSize: 10, color: '#6B7280' }}>{s.label}</div>
                </div>
              ))}
            </div>
          </div>
          <div>
            <div style={{ fontSize: 10, color: '#9CA3AF', textTransform: 'uppercase', letterSpacing: 1, marginBottom: 12 }}>Sizes</div>
            <div style={{ display: 'flex', gap: 24, alignItems: 'flex-end' }}>
              {[
                { n: '32', s: 32, t: 'Featured' },
                { n: '24', s: 24, t: 'Default' },
                { n: '20', s: 20, t: 'Compact' },
              ].map(sz => (
                <div key={sz.n} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6 }}>
                  <IconTarget size={sz.s} color="#1B3A5C"/>
                  <div style={{ fontSize: 10, color: '#374151',
                    fontFamily: 'JetBrains Mono, monospace' }}>{sz.n}px</div>
                  <div style={{ fontSize: 9, color: '#9CA3AF' }}>{sz.t}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      </DCArtboard>
    </DCSection>
  );
}

// Components section
function ComponentsSection({ accent }) {
  return (
    <DCSection title="05 · Mobile components"
      subtitle="Flutter-ready. Flat, 16px radius, tabular numbers on every amount.">

      <DCArtboard label="KPI metric card" width={280} height={300}>
        <div style={{ padding: 24, background: '#fff' }}>
          <div style={{
            background: '#1B3A5C', borderRadius: 16, padding: 16,
            color: '#fff',
          }}>
            <div style={{ fontSize: 11, letterSpacing: 0.3,
              color: 'rgba(255,255,255,0.7)', fontWeight: 400 }}>
              Gastos de abril
            </div>
            <div style={{ fontSize: 24, fontWeight: 700, marginTop: 6,
              fontVariantNumeric: 'tabular-nums' }}>R$ 5.218</div>
            <div style={{ display: 'inline-flex', alignItems: 'center', gap: 4, marginTop: 10,
              color: accent, fontSize: 12, fontWeight: 600 }}>
              <IconTrendUp size={13} color={accent}/> +8% vs. março
            </div>
          </div>
          <div style={{ fontSize: 10, color: '#9CA3AF', marginTop: 14,
            fontFamily: 'JetBrains Mono, monospace', lineHeight: 1.6 }}>
            r:16 · p:16 · shadow:none<br/>
            label 11/cap · value 24/700
          </div>
        </div>
      </DCArtboard>

      <DCArtboard label="Buttons" width={280} height={300}>
        <div style={{ padding: 24, display: 'flex', flexDirection: 'column', gap: 10 }}>
          <button style={btnPrimary}>Continuar</button>
          <button style={btnSecondary}>Adicionar conta</button>
          <button style={btnTertiary}>Pular por enquanto</button>
          <button style={btnDestructive}>Cancelar parcela</button>
          <div style={{ fontSize: 10, color: '#9CA3AF',
            fontFamily: 'JetBrains Mono, monospace', marginTop: 6 }}>
            h:56 · r:16
          </div>
        </div>
      </DCArtboard>

      <DCArtboard label="Transaction row" width={380} height={300}>
        <div style={{ padding: 16, background: '#fff' }}>
          {[
            { l: 'Salário Abril', s: 'CLT · 01/04', v: 6800, i: IconCLT, g: true },
            { l: 'Swile — Almoço', s: 'Alimentação', v: -42.8, i: IconBenefit },
            { l: 'Fatura Nubank', s: '4ª de 10', v: -389.90, i: IconParcela },
          ].map((t, i) => (
            <div key={i} style={{
              display: 'flex', alignItems: 'center', gap: 12, padding: '10px 0',
              borderTop: i > 0 ? '1px solid #F3F4F6' : 'none',
            }}>
              <div style={{
                width: 36, height: 36, borderRadius: 10,
                background: t.g ? 'rgba(26,122,74,0.1)' : '#F3F4F6',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
              }}><t.i size={18} color={t.g ? '#1A7A4A' : '#1B3A5C'}/></div>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 14, fontWeight: 500, color: '#1B3A5C' }}>{t.l}</div>
                <div style={{ fontSize: 11, color: '#6B7280', marginTop: 1 }}>{t.s}</div>
              </div>
              <BRL value={t.v} size={14} color={t.g ? '#1A7A4A' : '#1B3A5C'} sign/>
            </div>
          ))}
        </div>
      </DCArtboard>

      <DCArtboard label="Budget bar · states" width={320} height={300}>
        <div style={{ padding: 24, display: 'flex', flexDirection: 'column', gap: 16 }}>
          {[
            { l: 'Mercado',    p: 0.4, c: '#1A7A4A', s: '40% — tranquilo' },
            { l: 'Transporte', p: 0.78, c: '#F5A623', s: '78% — atenção' },
            { l: 'Lazer',      p: 0.95, c: '#E84855', s: '95% — alerta' },
          ].map(b => (
            <div key={b.l}>
              <div style={{ display: 'flex', justifyContent: 'space-between',
                fontSize: 12, color: '#374151', marginBottom: 6 }}>
                <span style={{ fontWeight: 500 }}>{b.l}</span>

              </div>
            </div>
          ))}
        </div>
      </DCArtboard>
    </DCSection>
  );
}

// ─────────────────────────────────────────────────────────────
// APP
// ─────────────────────────────────────────────────────────────
function App() {
  const [tweaks, setTweaks] = React.useState(TWEAKS);
  const [tweaksVisible, setTweaksVisible] = React.useState(false);

  const update = (patch) => {
    const next = { ...tweaks, ...patch };
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: patch }, '*');
  };

  React.useEffect(() => {
    const onMsg = (e) => {
      if (!e.data) return;
      if (e.data.type === '__activate_edit_mode')   setTweaksVisible(true);
      if (e.data.type === '__deactivate_edit_mode') setTweaksVisible(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const accent = HUE[tweaks.accentHue].beam;

  return (
    <>
      <DesignCanvas>
        <CanvasHeader logoConcept={tweaks.logoConcept}/>
        <LogosSection accent={accent}/>
        <ColorsSection/>
        <TypeSection/>
        <IconsSection accent={accent}/>
        <ComponentsSection accent={accent}/>
        <PrototypeSection logoConcept={tweaks.logoConcept}/>
      </DesignCanvas>
      <TweaksPanel values={tweaks} onChange={update} visible={tweaksVisible}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
