<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=1600"/>
<title>Farol — App Design (iOS)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #EEEAE3; min-height: 100vh;
    font-family: Inter, system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  * { box-sizing: border-box; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 3px; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="sanctuario/tokens.jsx"></script>
<script type="text/babel" src="sanctuario/screens-1-4.jsx"></script>
<script type="text/babel" src="sanctuario/screens-5-8.jsx"></script>
<script type="text/babel" src="sanctuario/screens-9-11.jsx"></script>

<script type="text/babel">
const { useState } = React;

function Canvas() {
  const screens = [
    { id: 'onboarding', label: '01 · Onboarding',        comp: <ScreenOnboarding/>,  note: 'Entrada · voz da marca e confiança' },
    { id: 'home',       label: '02 · Dashboard',         comp: <ScreenHome/>,        note: 'Patrimônio · KPIs · saúde financeira' },
    { id: 'gastos',     label: '03 · Gastos',            comp: <ScreenGastos/>,      note: 'Transações · chips · tags Swile' },
    { id: 'analisis',   label: '04 · Análise de Gastos', comp: <ScreenAnalisis/>,    note: 'Distribuição · projeção IA · tendência' },
    { id: 'metas',      label: '05 · Metas e Orçamento', comp: <ScreenMetas/>,       note: 'Salário · Swile · alocação ideal' },
    { id: 'portafolio', label: '06 · Carteira',          comp: <ScreenPortafolio/>,  note: 'Consolidado · alocação · sugestão IA' },
    { id: 'inversion',  label: '07 · Investimento',      comp: <ScreenInversion/>,   note: 'Tesouro Selic · gráfico · métricas' },
    { id: 'accion',     label: '08 · Ação (ITUB4)',      comp: <ScreenAccion/>,      note: 'Candles · posição · comprar/vender' },
    { id: 'swile',      label: '09 · Swile',             comp: <ScreenSwile/>,       note: 'Benefícios corporativos · VA / VR' },
    { id: 'notif',      label: '10 · Notificações',      comp: <ScreenNotif/>,       note: 'Críticas · IA · atualizações' },
    { id: 'ajustes',    label: '11 · Ajustes',           comp: <ScreenAjustes/>,     note: 'Perfil · idioma · aparência · suporte' },
  ];

  return (
    <div style={{ padding: '48px 40px 80px', maxWidth: 1680, margin: '0 auto' }}>
      {/* Header */}
      <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', marginBottom: 48 }}>
        <div>
          <div style={{ fontSize: 11, letterSpacing: 3, fontWeight: 700, color: '#6B7280',
            textTransform: 'uppercase' }}>App Design · iOS · Farol</div>
          <div style={{ fontFamily: 'Manrope, sans-serif', fontSize: 56, fontWeight: 800,
            letterSpacing: -2, color: '#1A1C1E', marginTop: 10, lineHeight: 1 }}>
            Farol <span style={{ color: '#6B7280', fontWeight: 500 }}>/ Finanças pessoais</span>
          </div>
          <div style={{ fontSize: 16, color: '#46484B', marginTop: 14, maxWidth: 640, lineHeight: 1.5 }}>
Clareza para cada real. Planejamento financeiro para CLT, FGTS e benefícios — Farol Navy com feixe âmbar, tipografia Manrope editorial, Inter para dados.
          </div>
        </div>
        <div style={{ display: 'flex', gap: 10 }}>
          <Chip dot="#1B3A5C" label="Farol Navy"/>
          <Chip dot="#F5A623" label="Farol Beam"/>
          <Chip dot="#1A7A4A" label="Farol Tide"/>
          <Chip dot="#E84855" label="Farol Coral"/>
        </div>
      </div>

      {/* Grid */}
      <div style={{
        display: 'grid',
        gridTemplateColumns: 'repeat(auto-fit, minmax(420px, 1fr))',
        gap: '56px 40px',
      }}>
        {screens.map(s => (
          <div key={s.id} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center' }}
            data-screen-label={s.label}>
            <div style={{ marginBottom: 20, alignSelf: 'stretch', maxWidth: 390, margin: '0 auto 20px' }}>
              <div style={{ fontSize: 11, letterSpacing: 2, fontWeight: 700, color: '#70737A',
                textTransform: 'uppercase' }}>{s.label}</div>
              <div style={{ fontSize: 13, color: '#46484B', marginTop: 4 }}>{s.note}</div>
            </div>
            {s.comp}
          </div>
        ))}
      </div>

      {/* Footer */}
      <div style={{ marginTop: 100, paddingTop: 32, borderTop: '1px solid rgba(0,0,0,0.08)',
        display: 'flex', justifyContent: 'space-between', fontSize: 12, color: '#70737A' }}>
        <span>Farol · 11 telas · iOS 390×844</span>
        <span>Manrope 800 · Inter 600 · tabular-nums · BRL</span>
      </div>
    </div>
  );
}

function Chip({ dot, label }) {
  return (
    <div style={{ display: 'inline-flex', alignItems: 'center', gap: 8,
      padding: '8px 14px', borderRadius: 99, background: '#fff',
      border: '1px solid rgba(0,0,0,0.06)', fontSize: 12, fontWeight: 600, color: '#1A1C1E' }}>
      <span style={{ width: 10, height: 10, borderRadius: 5, background: dot }}/>
      {label}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Canvas/>);
</script>
</body>
</html>
