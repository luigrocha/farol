name: Farol — Test Suite

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.41.x"

jobs:

  # ─────────────────────────────────────────────────────────────
  # Unit & Widget Tests
  # ─────────────────────────────────────────────────────────────
  unit_and_widget:
    name: Unit & Widget Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Cache Pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Flutter Doctor
        run: flutter doctor -v

      - name: Install dependencies
        run: flutter pub get

      - name: Dependency tree
        run: flutter pub deps

      - name: Verify formatting
        run: dart format . --output=none --set-exit-if-changed

      - name: Analyze project
        run: flutter analyze

      - name: Run Auth tests
        run: |
          flutter test test/features/auth/data/ \
            --reporter github \
            --coverage

      - name: Run Auth widget tests
        run: |
          flutter test test/features/auth/presentation/ \
            --reporter github \
            --coverage

      - name: Run remaining tests
        run: |
          flutter test test/ \
            --exclude-tags integration \
            --reporter github \
            --coverage

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: success()
        with:
          files: coverage/lcov.info
          flags: unit_widget
          fail_ci_if_error: false

  # ─────────────────────────────────────────────────────────────
  # Integration Tests
  # ─────────────────────────────────────────────────────────────
  integration:
    name: Integration Tests (Android)
    runs-on: macos-latest
    timeout-minutes: 35

    if: github.ref == 'refs/heads/main' || github.base_ref == 'main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run integration tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          script: |
            flutter test integration_test/auth_flow_test.dart \
              --reporter github

  # ─────────────────────────────────────────────────────────────
  # Web Build Smoke Test
  # ─────────────────────────────────────────────────────────────
  build_web:
    name: Web Build Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Cache Pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Enable web
        run: flutter config --enable-web

      - name: Build web release
        run: |
          flutter build web \
            --release \
            --web-renderer canvaskit \
            --no-tree-shake-icons \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL || 'https://placeholder.supabase.co' }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY || 'placeholder-key' }}

      - name: Verify build output
        run: test -f build/web/index.html