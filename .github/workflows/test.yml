name: Farol — Test Suite

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.41.x"

jobs:

  # ─────────────────────────────────────────────────────────────
  # Unit & Widget Tests
  # ─────────────────────────────────────────────────────────────
  unit_and_widget:
    name: Unit & Widget Tests
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      # ─────────────────────────────
      # Checkout
      # ─────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ─────────────────────────────
      # Flutter
      # ─────────────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      # ─────────────────────────────
      # Cache
      # ─────────────────────────────
      - name: Cache Pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      # ─────────────────────────────
      # Diagnostics
      # ─────────────────────────────
      - name: Flutter Doctor
        run: flutter doctor -v

      # ─────────────────────────────
      # Dependencies
      # ─────────────────────────────
      - name: Install dependencies
        run: flutter pub get

      # ─────────────────────────────
      # Formatting
      # ─────────────────────────────
      - name: Verify formatting
        run: dart format . --output=none --set-exit-if-changed

      # ─────────────────────────────
      # Static Analysis
      # ─────────────────────────────
      - name: Analyze project
        run: flutter analyze

      # ─────────────────────────────
      # Auth Tests
      # ─────────────────────────────
      - name: Run Auth data tests
        run: |
          flutter test test/features/auth/data/ \
            --reporter github \
            --coverage

      - name: Run Auth widget tests
        run: |
          flutter test test/features/auth/presentation/ \
            --reporter github \
            --coverage

      # ─────────────────────────────
      # Remaining Tests
      # ─────────────────────────────
      - name: Run remaining tests
        run: |
          flutter test test/ \
            --exclude-tags integration \
            --reporter github \
            --coverage

      # ─────────────────────────────
      # Coverage
      # ─────────────────────────────
      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: success()
        with:
          files: coverage/lcov.info
          flags: unit_widget
          fail_ci_if_error: false

  # ─────────────────────────────────────────────────────────────
  # Integration Tests
  # ─────────────────────────────────────────────────────────────
  integration:
    name: Integration Tests (Android)
    runs-on: macos-latest
    timeout-minutes: 45

    if: github.ref == 'refs/heads/main' || github.base_ref == 'main'

    steps:
      # ─────────────────────────────
      # Checkout
      # ─────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─────────────────────────────
      # Flutter
      # ─────────────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      # ─────────────────────────────
      # Dependencies
      # ─────────────────────────────
      - name: Install dependencies
        run: flutter pub get

      # ─────────────────────────────
      # Restart ADB
      # ─────────────────────────────
      - name: Restart ADB
        run: |
          adb kill-server || true
          adb start-server || true

      # ─────────────────────────────
      # Android Emulator
      # ─────────────────────────────
      - name: Run integration tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34

          # IMPORTANT FOR APPLE SILICON
          arch: arm64-v8a

          profile: pixel_7

          force-avd-creation: true

          emulator-options: >
            -no-window
            -no-audio
            -no-boot-anim
            -gpu swiftshader_indirect
            -camera-back none
            -camera-front none

          disable-animations: true

          emulator-boot-timeout: 900

          script: |
            adb devices

            flutter devices

            flutter test integration_test/auth_flow_test.dart \
              -d emulator-5554 \
              --reporter github

  # ─────────────────────────────────────────────────────────────
  # Web Build Smoke Test
  # ─────────────────────────────────────────────────────────────
  build_web:
    name: Web Build Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ─────────────────────────────
      # Checkout
      # ─────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─────────────────────────────
      # Flutter
      # ─────────────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      # ─────────────────────────────
      # Cache
      # ─────────────────────────────
      - name: Cache Pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      # ─────────────────────────────
      # Dependencies
      # ─────────────────────────────
      - name: Install dependencies
        run: flutter pub get

      # ─────────────────────────────
      # Enable Web
      # ─────────────────────────────
      - name: Enable web
        run: flutter config --enable-web

      # ─────────────────────────────
      # Build Web
      # ─────────────────────────────
      - name: Build web release
        run: |
          flutter build web \
            --release \
            --no-tree-shake-icons \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL || 'https://placeholder.supabase.co' }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY || 'placeholder-key' }}

      # ─────────────────────────────
      # Validate Build
      # ─────────────────────────────
      - name: Verify build output
        run: test -f build/web/index.html