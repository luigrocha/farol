name: farol
description: Farol - Your personal financial guide (CLT)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9

  # Database
  drift: ^2.15.0
  sqlite3_flutter_libs: ^0.5.18
  sqlite3: ^2.4.0
  path_provider: ^2.1.2
  path: ^1.8.3
  web: ^1.1.0

  # Charts
  fl_chart: ^0.71.0

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.0

  # Utilities
  csv: ^6.0.0
  share_plus: ^7.2.2
  pdf: ^3.10.8

  # Supabase & Auth
  supabase_flutter: ^2.4.3
  google_sign_in: ^6.1.6
  sign_in_with_apple: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.15.0
  build_runner: ^2.4.8
  shared_preferences: ^2.2.3
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  image_path: "assets/icon/icon.png"
  android: true
  ios: true
  macos:
    generate: true
    image_path: "assets/icon/icon.png"
  windows:
    generate: true
    image_path: "assets/icon/icon.png"
  web:
    generate: true
    image_path: "assets/icon/icon.png"
    background_color: "#1a3a5c"
    theme_color: "#1a3a5c"

dependency_overrides:
  web: ^1.1.0
  http: ^1.3.0

flutter:
  uses-material-design: true
